<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Motivasi Generator — DevServe</title>
    <style>
        /* === RESET & VARIABEL === */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --card: #22263a;
            --primary: #6c63ff;
            --primary-hover: #5a52e0;
            --accent: #00d4aa;
            --text: #e2e8f0;
            --muted: #8892a4;
            --border: #2e3347;
            --radius: 12px;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
        }

        /* === BASE === */
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        /* === HEADER === */
        header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        header p {
            color: var(--muted);
            margin-top: 0.5rem;
            font-size: 0.95rem;
        }

        /* === CARD === */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.75rem;
            width: 100%;
            max-width: 600px;
            box-shadow: var(--shadow);
            margin-bottom: 1.5rem;
        }

        .card h2 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 1.25rem;
        }

        /* === FORM === */
        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            color: var(--muted);
            margin-bottom: 0.4rem;
        }

        input {
            width: 100%;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.65rem 0.9rem;
            color: var(--text);
            font-size: 0.95rem;
            transition: border-color 0.2s;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
        }

        input[type="number"] {
            width: 100%;
        }

        /* === BUTTON === */
        button {
            width: 100%;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 0.75rem;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 0.5rem;
        }

        button:hover {
            background: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* === RESULT LIST === */
        #result-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .motivation-item {
            background: var(--card);
            border-left: 3px solid var(--primary);
            border-radius: 8px;
            padding: 0.9rem 1rem;
            font-size: 0.95rem;
            line-height: 1.6;
            animation: fadeIn 0.3s ease;
        }

        .motivation-item:nth-child(odd) {
            border-left-color: var(--accent);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* === HISTORY TABLE === */
        .history-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
        }

        .history-table th {
            text-align: left;
            padding: 0.5rem 0.75rem;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
            font-weight: 500;
        }

        .history-table td {
            padding: 0.6rem 0.75rem;
            border-bottom: 1px solid var(--border);
            color: var(--text);
            vertical-align: top;
        }

        .history-table tr:last-child td {
            border-bottom: none;
        }

        /* === STATUS === */
        #status {
            font-size: 0.85rem;
            margin-top: 0.6rem;
            min-height: 1.2rem;
            text-align: center;
        }

        .status-loading {
            color: var(--accent);
        }

        .status-error {
            color: #f87171;
        }

        .status-success {
            color: var(--accent);
        }

        /* === BADGE === */
        .badge {
            display: inline-block;
            background: var(--primary);
            color: #fff;
            font-size: 0.7rem;
            padding: 0.15rem 0.5rem;
            border-radius: 999px;
            font-weight: 600;
        }

        /* === EMPTY STATE === */
        .empty-state {
            text-align: center;
            color: var(--muted);
            padding: 2rem 0;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

    <!-- ===== HEADER ===== -->
    <header>
        <h1>✨ Motivasi Generator</h1>
        <p>Powered by Delcom</p>
    </header>

    <!-- ===== FORM GENERATE ===== -->
    <div class="card">
        <h2>Generate Motivasi Baru</h2>
        <div class="form-group">
            <label for="theme">Tema Motivasi</label>
            <input type="text" id="theme" placeholder="contoh: belajar, karir, persahabatan..." />
        </div>
        <div class="form-group">
            <label for="total">Jumlah (1–10)</label>
            <input type="number" id="total" min="1" max="10" value="5" />
        </div>
        <button id="btn-generate" onclick="handleGenerate()">🚀 Generate</button>
        <div id="status"></div>
    </div>

    <!-- ===== HASIL GENERATE ===== -->
    <div class="card" id="result-card" style="display:none;">
        <h2>Hasil Generate <span class="badge" id="result-count">0</span></h2>
        <div id="result-list"></div>
    </div>

    <!-- ===== RIWAYAT MOTIVASI ===== -->
    <div class="card">
        <h2 style="display:flex; justify-content:space-between; align-items:center;">
            <span>Riwayat Tersimpan</span>
            <button onclick="loadHistory()" style="width:auto; padding:0.35rem 0.75rem; font-size:0.8rem; margin:0;">
                ↻ Refresh
            </button>
        </h2>
        <div id="history-container">
            <div class="empty-state">Klik Refresh untuk memuat riwayat.</div>
        </div>
    </div>

    <!-- ===== SCRIPT ===== -->
    <script>
        const BASE_URL = "";

        function setStatus(msg, type = "") {
            const el = document.getElementById("status");
            el.textContent = msg;
            el.className = type ? `status-${type}` : "";
        }

        // --- Generate ---
        async function handleGenerate() {
            const theme = document.getElementById("theme").value.trim();
            const total = parseInt(document.getElementById("total").value);
            const btn = document.getElementById("btn-generate");

            if (!theme) return setStatus("⚠️ Tema tidak boleh kosong.", "error");
            if (!total || total < 1 || total > 10) return setStatus("⚠️ Jumlah harus antara 1–10.", "error");

            btn.disabled = true;
            setStatus("⏳ Sedang generate...", "loading");
            document.getElementById("result-card").style.display = "none";

            try {
                const res = await fetch(`${BASE_URL}/motivations/generate`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ theme, total })
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.error || "Request gagal");
                }

                const data = await res.json();
                renderResults(data);
                setStatus(`✅ Berhasil generate ${data.total} motivasi!`, "success");
                loadHistory();

            } catch (err) {
                setStatus(`❌ Error: ${err.message}`, "error");
            } finally {
                btn.disabled = false;
            }
        }

        function renderResults(data) {
            const list = document.getElementById("result-list");
            const card = document.getElementById("result-card");
            const countBadge = document.getElementById("result-count");

            list.innerHTML = "";
            countBadge.textContent = data.total;

            data.data.forEach(text => {
                const div = document.createElement("div");
                div.className = "motivation-item";
                div.textContent = text;
                list.appendChild(div);
            });

            card.style.display = "block";
        }

        // --- History ---
        async function loadHistory() {
            const container = document.getElementById("history-container");
            container.innerHTML = `<div class="empty-state">Memuat...</div>`;

            try {
                const res = await fetch(`${BASE_URL}/motivations?page=1&per_page=20`);
                const data = await res.json();

                if (!data.data || data.data.length === 0) {
                    container.innerHTML = `<div class="empty-state">Belum ada data tersimpan.</div>`;
                    return;
                }

                const table = document.createElement("table");
                table.className = "history-table";
                table.innerHTML = `
          <thead>
            <tr>
              <th>#</th>
              <th>Teks Motivasi</th>
              <th>Dibuat</th>
            </tr>
          </thead>
          <tbody>
            ${data.data.map(m => `
              <tr>
                <td>${m.id}</td>
                <td>${m.text}</td>
                <td>${new Date(m.created_at).toLocaleDateString("id-ID", {
                    day: "2-digit", month: "short", year: "numeric"
                })}</td>
              </tr>
            `).join("")}
          </tbody>
        `;
                container.innerHTML = "";
                container.appendChild(table);

            } catch (err) {
                container.innerHTML = `<div class="empty-state" style="color:#f87171;">Gagal memuat data: ${err.message}</div>`;
            }
        }
    </script>

</body>

</html>
